server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        # AUTH SERVICE (auth, users, notifications)
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/test,/api/users/**,/api/notifications/**

        # HOTEL + ROOM + REVIEW + AMENITY SERVICE
        - id: hotel-service
          uri: ${HOTEL_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/hotels/**,/api/rooms/**,/api/reviews/**,/api/amenities/**

        # PAYMENT SERVICE
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/**

        # BOOKING + COUPON + REPORT SERVICE
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/bookings/**,/api/coupons/**,/api/reports/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
