server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:test}
    password: ${MAIL_PASSWORD:test}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

otp:
  expiry: ${OTP_EXPIRY:300}

jwt:
  secret: ${JWT_SECRET:test-secret}
  expiry: ${JWT_EXPIRY:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false